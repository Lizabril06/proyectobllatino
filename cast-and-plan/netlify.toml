[build]
  # Genera _index.json para cada carpeta de datos antes de publicar
  command = "node generate-indexes.js"
  publish = "."

# ─── Cabeceras de seguridad y cache ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# No cachear el HTML principal ni los datos
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cachear imágenes por 1 año
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Rutas / Redirects ────────────────────────────────────────────────────────
# Redirige /admin a /admin/ para que el CMS cargue correctamente
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# ─── Identity (Netlify Identity para autenticación del CMS) ───────────────────
# Netlify Identity está habilitado desde el panel de Netlify:
# Site Settings → Identity → Enable Identity
# Luego: Registration → Invite only
# Y: Services → Git Gateway → Enable Git Gateway
